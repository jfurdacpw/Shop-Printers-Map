<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Printer Locator</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div class="app">
    <!-- Left panel: search, list, controls -->
    <aside class="panel">
      <h1>Printer Locator</h1>
      <div class="search-wrap">
        <input type="text" id="search" class="search" placeholder="Search printers…" autocomplete="off">
      </div>
      <ul id="printer-list" class="printer-list" role="listbox"></ul>
      <div class="panel-actions">
        <button type="button" id="reset-view" class="btn">Reset view</button>
        <label class="toggle-wrap">
          <input type="checkbox" id="edit-mode" class="toggle">
          <span>Edit mode</span>
        </label>
      </div>
    </aside>

    <!-- Map viewport: canvas + pin overlay, pan/zoom applied to inner wrapper -->
    <main class="viewport-wrap">
      <div id="viewport" class="viewport">
        <div id="map-layer" class="map-layer">
          <canvas id="pdf-canvas"></canvas>
          <div id="pins-container" class="pins-container"></div>
        </div>
      </div>
    </main>

    <!-- Info card (shown when a pin is clicked) -->
    <div id="info-card" class="info-card hidden" role="dialog" aria-label="Printer details">
      <button type="button" id="info-close" class="info-close" aria-label="Close">×</button>
      <div id="info-content"></div>
    </div>

    <!-- Toast for edit mode (xPct, yPct) -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
